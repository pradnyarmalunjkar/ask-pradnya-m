<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Pradnya — AI Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
button{font-family:'Outfit',sans-serif;cursor:pointer;background:none;border:none;outline:none;-webkit-appearance:none;}
button:focus,button:focus-visible{outline:none;box-shadow:none;}
:root{
  --bg:#faf9f7;
  --white:#ffffff;
  --ink:#18170f;
  --ink2:#6b6860;
  --ink3:#b8b4ab;
  --line:#e8e5df;
  --line2:#d4cfc8;
  --accent:#d44f1e;
  --acc-bg:#fef3ee;
  --acc-br:rgba(212,79,30,.16);
  --off:#f3f2ef;
  --green:#16a34a;
  --r:10px;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;}

/* ── Ambient floating orbs on splash ── */
#splash::before,#splash::after{
  content:'';position:absolute;border-radius:50%;pointer-events:none;
}
#splash::before{
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(212,79,30,.08) 0%,transparent 70%);
  top:-150px;right:-120px;
  animation:orb1 9s ease-in-out infinite;
}
#splash::after{
  width:380px;height:380px;
  background:radial-gradient(circle,rgba(212,79,30,.06) 0%,transparent 70%);
  bottom:-100px;left:-80px;
  animation:orb2 12s ease-in-out infinite;
}
@keyframes orb1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-40px,40px) scale(1.15);}}
@keyframes orb2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,-30px) scale(1.1);}}

/* ── Splash icon float ── */
.sp-icon{animation:iconPop .6s cubic-bezier(.16,1,.3,1) .15s both, iconFloat 4s ease-in-out 1s infinite;}
@keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

/* ── Splash icon shimmer on hover ── */
.sp-icon::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);opacity:0;transition:opacity .3s;}
.sp-icon{position:relative;}
.sp-icon:hover::after{opacity:1;}

/* ── Message row entrance ── */
@keyframes msgIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.mrow{animation:msgIn .35s cubic-bezier(.16,1,.3,1) both;}
.mrow.you{animation:msgInRight .35s cubic-bezier(.16,1,.3,1) both;}
@keyframes msgInRight{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);}}

/* ── Card entrance stagger ── */
@keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.c-profile{animation:cardIn .45s cubic-bezier(.16,1,.3,1) .08s both;}
.cs-card{animation:cardIn .45s cubic-bezier(.16,1,.3,1) .12s both;}
.c-skills{animation:cardIn .45s cubic-bezier(.16,1,.3,1) .1s both;}
.c-proc{animation:cardIn .45s cubic-bezier(.16,1,.3,1) .1s both;}
.c-contact{animation:cardIn .45s cubic-bezier(.16,1,.3,1) .1s both;}

/* ── Project grid cards stagger ── */
@keyframes gridIn{from{opacity:0;transform:translateY(16px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.all-grid .ag:nth-child(1){animation:gridIn .35s cubic-bezier(.16,1,.3,1) .05s both;}
.all-grid .ag:nth-child(2){animation:gridIn .35s cubic-bezier(.16,1,.3,1) .10s both;}
.all-grid .ag:nth-child(3){animation:gridIn .35s cubic-bezier(.16,1,.3,1) .15s both;}
.all-grid .ag:nth-child(4){animation:gridIn .35s cubic-bezier(.16,1,.3,1) .20s both;}
.all-grid .ag:nth-child(5){animation:gridIn .35s cubic-bezier(.16,1,.3,1) .25s both;}
.all-grid .ag:nth-child(6){animation:gridIn .35s cubic-bezier(.16,1,.3,1) .30s both;}
.all-grid .ag:nth-child(n+7){animation:gridIn .35s cubic-bezier(.16,1,.3,1) .35s both;}

/* ── Card hover lift ── */
.c-profile,.cs-card{transition:box-shadow .25s ease,transform .25s ease;}
.c-profile:hover,.cs-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.09);}

/* ── Project grid card hover ── */
.ag{transition:all .2s cubic-bezier(.16,1,.3,1);}
.ag:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 10px 28px rgba(0,0,0,.09);border-color:var(--line2);}

/* ── Skill tag entrance stagger ── */
@keyframes tagPop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.sk-tag{animation:tagPop .25s cubic-bezier(.16,1,.3,1) both;}
.sk-tags .sk-tag:nth-child(1){animation-delay:.02s;}
.sk-tags .sk-tag:nth-child(2){animation-delay:.04s;}
.sk-tags .sk-tag:nth-child(3){animation-delay:.06s;}
.sk-tags .sk-tag:nth-child(4){animation-delay:.08s;}
.sk-tags .sk-tag:nth-child(5){animation-delay:.10s;}
.sk-tags .sk-tag:nth-child(6){animation-delay:.12s;}
.sk-tags .sk-tag:nth-child(7){animation-delay:.14s;}
.sk-tags .sk-tag:nth-child(n+8){animation-delay:.16s;}

/* ── Chip button press + hover ── */
.cc,.fup,.sp-btn-tile{transition:all .15s cubic-bezier(.16,1,.3,1);}
.cc:active,.fup:active,.sp-btn-tile:active{transform:scale(.93);}
.cc:hover,.fup:hover{transform:translateY(-1px);}

/* ── Send button pulse on hover ── */
#sb{transition:all .18s cubic-bezier(.16,1,.3,1);}
#sb:hover{transform:scale(1.08);}
#sb:active{transform:scale(.94);}

/* ── Input focus glow ── */
.foot-in{transition:border-color .2s ease, box-shadow .2s ease;}
.foot-in:focus-within{border-color:var(--ink3);box-shadow:0 0 0 3px rgba(24,23,15,.06),0 2px 8px rgba(0,0,0,.06);}

/* ── Sticky nav slide-down ── */
@keyframes navSlide{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}
.sticky-chips{animation:navSlide .35s cubic-bezier(.16,1,.3,1);}

/* ── Active nav tab accent ── */
@keyframes tabPulse{0%{box-shadow:0 0 0 0 rgba(212,79,30,.35);}70%{box-shadow:0 0 0 7px rgba(212,79,30,0);}100%{box-shadow:0 0 0 0 rgba(212,79,30,0);}}
.cc.active{animation:tabPulse .6s ease;}

/* ── Process step entrance ── */
@keyframes stepIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
.proc-step:nth-child(1){animation:stepIn .3s ease .05s both;}
.proc-step:nth-child(2){animation:stepIn .3s ease .12s both;}
.proc-step:nth-child(3){animation:stepIn .3s ease .19s both;}
.proc-step:nth-child(4){animation:stepIn .3s ease .26s both;}
.proc-step:nth-child(5){animation:stepIn .3s ease .33s both;}

/* ── Contact item entrance ── */
@keyframes ctIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.ct-item:nth-child(1){animation:ctIn .28s ease .05s both;}
.ct-item:nth-child(2){animation:ctIn .28s ease .10s both;}
.ct-item:nth-child(3){animation:ctIn .28s ease .15s both;}
.ct-item:nth-child(4){animation:ctIn .28s ease .20s both;}
.ct-item:nth-child(5){animation:ctIn .28s ease .25s both;}
.ct-item:nth-child(6){animation:ctIn .28s ease .30s both;}

/* ── Dots breathing ── */
@keyframes bob{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}

/* ── Topbar fade-in ── */
@keyframes tbIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.topbar{animation:tbIn .4s cubic-bezier(.16,1,.3,1) .1s both;}

/* ── fup shimmer on appear ── */
@keyframes fupIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fups{animation:fupIn .3s cubic-bezier(.16,1,.3,1) .2s both;}


/* ── Typing dots bounce ── */
@keyframes bob{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* ── Send button hover ── */
#sb{transition:all .15s ease;}
#sb:hover{transform:scale(1.08);}

/* ── Topbar subtle border glow on focus-within ── */
.foot-in{transition:border-color .2s ease, box-shadow .2s ease;}
.foot-in:focus-within{border-color:var(--ink3);box-shadow:0 0 0 3px rgba(24,23,15,.05);}

/* ── Profile link hover ── */
.cp-lnk{transition:all .15s cubic-bezier(.16,1,.3,1);}
.cp-lnk:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08);}
.cp-lnk.f:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(24,23,15,.25);}

/* ── Contact item hover ── */
.ct-item{transition:all .15s ease;}
.ct-item:hover{padding-left:20px;}

/* ── Skill tag pop in ── */
@keyframes tagPop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.sk-tags .sk-tag{animation:tagPop .2s cubic-bezier(.16,1,.3,1) both;}
.sk-tags .sk-tag:nth-child(1){animation-delay:.03s}.sk-tags .sk-tag:nth-child(2){animation-delay:.06s}
.sk-tags .sk-tag:nth-child(3){animation-delay:.09s}.sk-tags .sk-tag:nth-child(4){animation-delay:.12s}
.sk-tags .sk-tag:nth-child(5){animation-delay:.15s}.sk-tags .sk-tag:nth-child(6){animation-delay:.18s}
.sk-tags .sk-tag:nth-child(7){animation-delay:.21s}.sk-tags .sk-tag:nth-child(8){animation-delay:.24s}
.sk-tags .sk-tag:nth-child(9){animation-delay:.27s}.sk-tags .sk-tag:nth-child(10){animation-delay:.30s}

/* ── Process step slide in ── */
@keyframes stepIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
.proc-step{animation:stepIn .35s cubic-bezier(.16,1,.3,1) both;}
.proc-step:nth-child(1){animation-delay:.05s}.proc-step:nth-child(2){animation-delay:.12s}
.proc-step:nth-child(3){animation-delay:.19s}.proc-step:nth-child(4){animation-delay:.26s}
.proc-step:nth-child(5){animation-delay:.33s}

/* ══ RICH ANIMATIONS ══ */

/* ── Floating background orbs on splash ── */
.sp-orb{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;animation:orbFloat linear infinite;}
.sp-orb1{width:320px;height:320px;background:radial-gradient(circle,rgba(212,79,30,.12) 0%,transparent 70%);top:-80px;left:-100px;animation-duration:18s;animation-delay:0s;}
.sp-orb2{width:260px;height:260px;background:radial-gradient(circle,rgba(212,79,30,.08) 0%,transparent 70%);bottom:-60px;right:-80px;animation-duration:22s;animation-delay:-8s;}
.sp-orb3{width:180px;height:180px;background:radial-gradient(circle,rgba(24,23,15,.06) 0%,transparent 70%);top:40%;right:8%;animation-duration:15s;animation-delay:-4s;}
@keyframes orbFloat{
  0%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-20px) scale(1.08);}
  66%{transform:translate(-20px,30px) scale(.94);}
  100%{transform:translate(0,0) scale(1);}
}

/* ── Icon gentle float ── */
@keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.sp-icon{animation:iconPop .6s cubic-bezier(.16,1,.3,1) .15s both, iconFloat 4s ease-in-out 1s infinite;}

/* ── Shimmer sweep on profile card ── */
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.c-profile::after{content:'';position:absolute;inset:0;border-radius:var(--r);background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.18) 50%,transparent 60%);background-size:200% 100%;animation:shimmer 3.5s ease 0.5s 1;pointer-events:none;}
.c-profile{position:relative;overflow:hidden;}

/* ── AI avatar heartbeat ── */
@keyframes beat{0%,100%{transform:scale(1);}15%{transform:scale(1.15);}30%{transform:scale(1);}}
.av.ai{animation:beat 2.8s ease-in-out infinite;}

/* ── Message row entrance with spring ── */
@keyframes msgIn{from{opacity:0;transform:translateY(16px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.mrow:not(.you){animation:msgIn .45s cubic-bezier(.16,1,.3,1) both;}

/* ── Follow-up buttons wave entrance ── */
.fups .fup:nth-child(1){animation:fupIn .3s cubic-bezier(.16,1,.3,1) .05s both;}
.fups .fup:nth-child(2){animation:fupIn .3s cubic-bezier(.16,1,.3,1) .12s both;}
.fups .fup:nth-child(3){animation:fupIn .3s cubic-bezier(.16,1,.3,1) .19s both;}
.fups .fup:nth-child(4){animation:fupIn .3s cubic-bezier(.16,1,.3,1) .26s both;}

/* ── Project card shimmer on hover ── */
.ag{position:relative;overflow:hidden;}
.ag::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.22) 50%,transparent 65%);background-size:200% 100%;background-position:200% 0;transition:background-position .5s ease;pointer-events:none;}
.ag:hover::after{background-position:-200% 0;}

/* ── Topbar title glow on hover ── */
.tb-title{transition:color .2s ease;}
.topbar:hover .tb-title{color:var(--accent);}

/* ── Resume download button pulse ── */
@keyframes resumePulse{0%,100%{box-shadow:0 0 0 0 rgba(212,79,30,.3);}50%{box-shadow:0 0 0 8px rgba(212,79,30,0);}}
#snav-resume{animation:resumePulse 2.5s ease-in-out infinite;}

/* ── Expertise tag hover glow ── */
.cp-tag{transition:all .15s ease;}
.cp-tag:hover{transform:translateY(-2px);box-shadow:0 3px 8px rgba(0,0,0,.08);}

/* ── Input placeholder shimmer ── */
@keyframes placeholderShift{0%,100%{opacity:.5;}50%{opacity:.9;}}
#ci::placeholder{animation:placeholderShift 3s ease infinite;}

/* ══ SPLASH ══ */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;padding:24px;text-align:center;overflow:hidden;}
#splash.hide{animation:splashOut .5s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes splashOut{to{opacity:0;transform:scale(.97);}}

/* Phase 1: icon + name + subtitle — centered, no tiles */
.sp-phase1{display:flex;flex-direction:column;align-items:center;animation:up .5s cubic-bezier(.16,1,.3,1) .1s both;}

/* Gradient icon */
.sp-icon{width:100px;height:100px;border-radius:26px;background:#18170f;display:flex;align-items:center;justify-content:center;margin-bottom:32px;box-shadow:0 24px 64px rgba(0,0,0,.25),0 8px 24px rgba(0,0,0,.15),0 0 0 1px rgba(255,255,255,.06);}
@keyframes iconPop{from{opacity:0;transform:scale(.6) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.sp-icon svg{width:56px;height:56px;color:#fff;filter:drop-shadow(0 2px 8px rgba(255,255,255,.15));}

/* Big name */
.sp-name{font-size:clamp(42px,8vw,72px);font-weight:700;letter-spacing:-.04em;line-height:1;color:var(--ink);margin-bottom:16px;animation:up .5s cubic-bezier(.16,1,.3,1) .3s both;}

/* Subtitle tag */
.sp-badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);animation:up .5s cubic-bezier(.16,1,.3,1) .45s both;}
.sp-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 1.6s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* Typewriter line */
.sp-typewriter{font-size:14px;color:var(--ink2);font-weight:400;margin-top:10px;min-height:22px;animation:up .4s ease .6s both;}
.sp-typewriter::after{content:'|';color:var(--accent);animation:cur .7s step-end infinite;margin-left:1px;}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}

/* Phase 2: grid + button — slide up after delay */
.sp-phase2{display:flex;flex-direction:column;align-items:center;margin-top:40px;animation:slideUp .6s cubic-bezier(.16,1,.3,1) 1.1s both;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

.sp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;max-width:420px;width:100%;margin-bottom:20px;}
.sp-btn-tile{border:1px solid var(--line2);border-radius:var(--r);padding:11px 12px;font-size:12px;font-weight:400;color:var(--ink2);cursor:pointer;background:var(--white);transition:all .15s;text-align:center;line-height:1.3;font-family:'Outfit',sans-serif;}
.sp-btn-tile:hover{border-color:var(--accent);color:var(--accent);background:var(--acc-bg);}
.sp-enter{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;border-radius:var(--r);padding:12px 28px;font-size:13.5px;font-weight:500;cursor:pointer;transition:background .15s;font-family:'Outfit',sans-serif;}
.sp-enter:hover{background:var(--accent);}
.sp-enter svg{width:14px;height:14px;}

@keyframes up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* AI typing cursor */
.at.typing::after{content:'▋';display:inline-block;animation:cur .6s step-end infinite;font-size:.9em;margin-left:1px;color:var(--accent);}

/* ══ APP ══ */
#app{display:flex;flex-direction:column;height:100vh;opacity:0;pointer-events:none;transition:opacity .35s ease;}
#app.on{opacity:1;pointer-events:all;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100%;width:100%;}

/* top bar */
.topbar{height:48px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;background:var(--bg);}
.tb-l{display:flex;align-items:center;gap:8px;}
.tb-title{font-size:13px;font-weight:500;letter-spacing:-.01em;}
.tb-live{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--ink3);}
.tb-live-d{width:4px;height:4px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
.tb-r{display:flex;gap:5px;}
.tbtn{padding:5px 11px;border:1px solid var(--line);border-radius:7px;font-size:11.5px;font-weight:400;color:var(--ink2);background:transparent;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .12s;text-decoration:none;display:flex;align-items:center;}
.tbtn:hover{border-color:var(--line2);color:var(--ink);}

/* header */
.chat-hd{max-width:780px;margin:0 auto;width:100%;padding:32px 20px 20px;text-align:center;}
.chat-hd-sub{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;font-weight:500;}
.chat-hd-t{font-size:clamp(22px,3.5vw,32px);font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:6px;}
.chat-hd-t em{font-style:normal;color:var(--accent);}
.chat-hd-s{font-size:13px;color:var(--ink2);font-weight:300;margin-bottom:18px;line-height:1.6;}
.chat-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;}
.cc{padding:7px 16px;border:1px solid var(--line);border-radius:20px;font-size:12px;font-weight:400;color:var(--ink2);cursor:pointer;background:var(--white);font-family:'Outfit',sans-serif;transition:all .12s;display:inline-flex;align-items:center;gap:5px;}
.cc svg{width:12px;height:12px;flex-shrink:0;opacity:.7;}
.cc:hover{border-color:var(--line2);color:var(--ink);}
.cc:hover svg{opacity:1;}
.cc.active{border-color:var(--ink);color:var(--ink);background:var(--off);font-weight:500;}
.cc.active svg{opacity:1;}

/* Sticky chip bar */
.sticky-chips{
  position:sticky;top:0;z-index:30;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  padding:8px 20px;
  display:flex;flex-wrap:wrap;justify-content:center;gap:6px;
  animation:up .2s ease;
}

/* feed */
.feed{flex:1;overflow-y:auto;scroll-behavior:smooth;}
.feed::-webkit-scrollbar{width:2px;}
.feed::-webkit-scrollbar-thumb{background:var(--line2);}
.inner{max-width:780px;margin:0 auto;padding:8px 20px 32px;}

/* divider */
.div-line{display:flex;align-items:center;gap:10px;color:var(--ink3);font-size:10.5px;margin:4px 0 18px;}
.div-line::before,.div-line::after{content:'';flex:1;height:1px;background:var(--line);}

/* messages */
.mrow{display:flex;gap:12px;margin-bottom:24px;align-items:flex-end;animation:msgIn .35s cubic-bezier(.16,1,.3,1) both;}
.mrow.you{justify-content:flex-end;gap:10px;}

/* AI avatar — small, left aligned */
.av{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.av.ai{background:#18170f;color:#fff;box-shadow:0 3px 12px rgba(0,0,0,.18);}
.av.user{width:28px;height:28px;border-radius:50%;background:var(--off);border:1px solid var(--line2);color:var(--ink3);}

/* AI message bubble */
.mb{max-width:72%;min-width:0;}
.mn{display:none;} /* hide name label — clean look */
.at{font-size:14px;line-height:1.75;color:var(--ink);font-weight:300;overflow:hidden;}
.at strong{font-weight:500;color:var(--ink);}
.at em[style*="float"]{display:block;float:right;clear:none;}

/* User bubble — dark pill */
.yb{
  display:inline-block;
  background:var(--ink);
  color:#fff;
  padding:9px 15px;
  border-radius:18px 18px 3px 18px;
  font-size:13.5px;
  line-height:1.5;
  font-weight:300;
  max-width:80%;
}

.fups{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.fup{padding:6px 14px;border:1px solid var(--line);border-radius:20px;font-size:12px;font-weight:400;color:var(--ink2);cursor:pointer;background:var(--white);font-family:'Outfit',sans-serif;transition:all .12s;display:inline-flex;align-items:center;gap:5px;}
.fup svg{width:11px;height:11px;flex-shrink:0;opacity:.6;}
.fup:hover{border-color:var(--accent);color:var(--accent);background:var(--acc-bg);}

.dots{display:flex;gap:5px;align-items:center;padding:14px 18px;background:var(--white);border:1px solid var(--line);border-radius:18px 18px 18px 4px;box-shadow:0 2px 12px rgba(0,0,0,.04);}
.d{width:5px;height:5px;border-radius:50%;background:var(--ink3);animation:bob 1s ease infinite;}
.d:nth-child(2){animation-delay:.15s}.d:nth-child(3){animation-delay:.3s}
@keyframes bob{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* ══ CARDS ══ */

/* Profile */
.c-profile{border:1px solid var(--line);border-radius:var(--r);background:var(--white);margin-top:12px;overflow:hidden;}
.cp-head{display:flex;gap:12px;padding:16px;border-bottom:1px solid var(--line);}
.cp-av{width:48px;height:48px;border-radius:13px;background:#18170f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.2);}
.cp-name{font-size:15px;font-weight:700;letter-spacing:-.02em;margin-bottom:2px;}
.cp-role{font-size:12px;color:var(--ink2);font-weight:300;margin-bottom:7px;}
.cp-tags{display:flex;flex-wrap:wrap;gap:4px;}
.cp-tag{padding:2px 8px;border-radius:4px;font-size:10.5px;background:var(--off);color:var(--ink2);border:1px solid var(--line);}
.cp-tag.hi{background:var(--acc-bg);color:var(--accent);border-color:var(--acc-br);}
.cp-nums{display:grid;grid-template-columns:repeat(2,1fr);border-bottom:1px solid var(--line);}
.cp-n{padding:12px 16px;border-right:1px solid var(--line);}
.cp-n:last-child{border-right:none;}
.cp-nn{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:4px;}
.cp-nv{font-size:13px;font-weight:500;color:var(--ink);}
.cp-bio{padding:14px 16px;font-size:13.5px;line-height:1.7;color:var(--ink2);font-weight:300;border-bottom:1px solid var(--line);}
.cp-exp{padding:0 16px 14px;margin-top:12px;}
.cp-exp-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:10px;font-weight:600;}
.cp-exp-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.cp-exp-dot{width:7px;height:7px;border-radius:50%;background:var(--line2);flex-shrink:0;margin-top:5px;}
.cp-exp-co{font-size:12.5px;font-weight:500;}
.cp-exp-yr{font-size:11px;color:var(--ink3);font-weight:300;}
.cp-links{display:flex;gap:6px;flex-wrap:wrap;padding:12px 16px;border-top:1px solid var(--line);}
.cp-lnk{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;border:1px solid var(--line);background:var(--white);color:var(--ink2);text-decoration:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .12s;}
.cp-lnk:hover{border-color:var(--line2);color:var(--ink);}
.cp-lnk.f{background:var(--ink);color:#fff;border-color:var(--ink);}
.cp-lnk.f:hover{background:var(--accent);border-color:var(--accent);}

/* Case study card - ask-sanket style full inline */
.cs-card{border:1px solid var(--line);border-radius:var(--r);background:var(--white);margin-top:12px;overflow:hidden;}
.cs-card-eyebrow{background:var(--acc-bg);border-bottom:1px solid var(--acc-br);padding:8px 16px;display:flex;align-items:center;gap:8px;}
.cs-card-tag{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);}
.cs-card-type{font-size:9.5px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;}
.cs-card-head{padding:16px 18px 14px;}
.cs-card-title{font-size:20px;font-weight:700;letter-spacing:-.03em;line-height:1.15;margin-bottom:12px;}
.cs-meta-row{display:flex;flex-wrap:wrap;gap:16px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:14px;}
.cs-meta-item{display:flex;flex-direction:column;gap:2px;}
.cs-meta-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);font-weight:600;}
.cs-meta-val{font-size:12px;font-weight:500;}
.cs-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;}
.cs-tag{padding:3px 8px;border-radius:4px;font-size:11px;background:var(--off);color:var(--ink2);border:1px solid var(--line);}

/* Sections inside case study */
.cs-section{padding:0 18px 16px;}
.cs-section+.cs-section{border-top:1px solid var(--line);padding-top:14px;}
.cs-sec-label{display:flex;align-items:center;gap:6px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:10px;}
.cs-sec-label svg{width:10px;height:10px;}
.cs-body-text{font-size:13.5px;line-height:1.72;color:var(--ink2);font-weight:300;}
.cs-body-text strong{color:var(--ink);font-weight:500;}

/* problem highlight box */
.cs-prob-box{background:var(--acc-bg);border:1px solid var(--acc-br);border-radius:8px;padding:14px;}
.cs-prob-q{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:7px;line-height:1.5;}
.cs-prob-a{font-size:13px;line-height:1.7;color:var(--ink2);font-weight:300;}

/* Key decisions / highlights */
.cs-decisions{display:flex;flex-direction:column;gap:8px;}
.cs-decision{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--off);}
.cs-dec-n{width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px;}
.cs-dec-t{font-size:12.5px;font-weight:600;margin-bottom:2px;}
.cs-dec-b{font-size:12px;color:var(--ink2);line-height:1.6;font-weight:300;}

/* personas */
.cs-personas{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:500px){.cs-personas{grid-template-columns:1fr;}}
.cs-persona{border:1px solid var(--line);border-radius:8px;padding:12px;background:var(--off);}
.cs-per-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cs-per-av{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.cs-per-name{font-size:12px;font-weight:600;}
.cs-per-role{font-size:10.5px;color:var(--ink3);font-weight:300;}
.cs-per-item{display:flex;gap:5px;font-size:12px;color:var(--ink2);margin-bottom:3px;line-height:1.5;font-weight:300;}
.cs-per-item::before{content:'→';color:var(--accent);flex-shrink:0;font-size:11px;margin-top:1px;}

/* outcomes grid */
.cs-outcomes{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
@media(max-width:500px){.cs-outcomes{grid-template-columns:1fr;}}
.cs-out{border:1px solid var(--line);border-radius:8px;padding:11px;background:var(--off);}
.cs-out-ic{font-size:16px;margin-bottom:4px;}
.cs-out-t{font-size:12px;font-weight:600;margin-bottom:3px;}
.cs-out-b{font-size:11.5px;color:var(--ink2);line-height:1.55;font-weight:300;}

/* results */
.cs-results{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
@media(max-width:380px){.cs-results{grid-template-columns:1fr 1fr;}}
.cs-res{background:#f0fdf4;border:1px solid rgba(22,163,74,.14);border-radius:8px;padding:10px;text-align:center;}
.cs-res-n{font-size:20px;font-weight:700;color:var(--green);letter-spacing:-.03em;}
.cs-res-l{font-size:10px;color:var(--ink2);font-weight:300;margin-top:1px;}
.cs-res-text{font-size:13px;line-height:1.7;color:var(--ink2);font-weight:300;}

/* card bottom actions */
.cs-actions{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.cs-act{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .12s;border:1px solid var(--line);background:var(--white);color:var(--ink2);}
.cs-act:hover{border-color:var(--line2);color:var(--ink);}
.cs-act.f{background:var(--ink);color:#fff;border-color:var(--ink);}
.cs-act.f:hover{background:var(--accent);border-color:var(--accent);}
.cs-act.dl{background:var(--accent);color:#fff;border-color:var(--accent);display:flex;align-items:center;gap:6px;}
.cs-act.dl:hover{opacity:.88;}
.cs-act.dl svg{width:13px;height:13px;}

/* collapsible case study */
.cs-toggle-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;user-select:none;
  transition:background .12s;
}
.cs-toggle-head:hover{background:var(--off);}
.cs-toggle-info{display:flex;align-items:center;gap:12px;}
.cs-toggle-ico{width:34px;height:34px;border-radius:8px;background:var(--acc-bg);border:1px solid var(--acc-br);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.cs-toggle-title{font-size:14px;font-weight:600;letter-spacing:-.01em;}
.cs-toggle-type{font-size:11px;color:var(--ink3);font-weight:300;}
.cs-toggle-chv{color:var(--ink3);font-size:18px;transition:transform .25s;flex-shrink:0;line-height:1;}
.cs-card.collapsed .cs-toggle-chv{transform:rotate(0deg);}
.cs-card:not(.collapsed) .cs-toggle-chv{transform:rotate(180deg);}
.cs-collapsible{overflow:hidden;transition:max-height .35s ease;max-height:9999px;}
.cs-card.collapsed .cs-collapsible{max-height:0;}

.c-profile.sticky-profile{

.c-profile.sticky-profile.expanded .cp-bio,
.c-profile.sticky-profile.expanded .cp-exp,
.c-profile.sticky-profile.expanded .cp-nums{display:block;}

.all-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px;}

function go(key) {
  document.getElementById('splash').classList.add('hide');
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('app').classList.add('on');
    injectBtnIcons();
    started = true;
    if (key) setTimeout(() => fire(key), 300);
  }, 450);
}

function sideQ(key) {
  if (!started) { go(key); return; }
  fire(key);
}

function fire(key) {
  hideHead();
  if (key === 'proj_next') {
    lastProjIdx = (lastProjIdx + 1) % PJ_IDS.length;
    key = 'proj_' + PJ_IDS[lastProjIdx];
  }
  setActiveNav(key);
  const resp = RESP[key] || FALLBACK;
  const ty = addTyping();
  setTimeout(() => { ty.remove(); showResp(resp.text, resp.card, resp.fups); }, 500);
}

function q(text) {
  if (!started) { go(resolveKey(text) || null); return; }
  hideHead();
  addUser(text);
  const lo = text.toLowerCase().trim();
  let key = LABEL_MAP[lo] || resolveKey(text);
  if (!key) {
    // fuzzy match against KEYS
    for (let i = 0; i < KEYS.length; i++) {
      if (KEYS[i].some(k => lo.includes(k))) { key = KEY_RESP[i]; break; }
    }
  }
  if (key === 'proj_next') {
    lastProjIdx = (lastProjIdx + 1) % PJ_IDS.length;
    key = 'proj_' + PJ_IDS[lastProjIdx];
  }
  const resp = key ? (RESP[key] || FALLBACK) : FALLBACK;
  const ty = addTyping();
  setTimeout(() => { ty.remove(); showResp(resp.text, resp.card, resp.fups); }, 450);
}

function send() {
  const el = document.getElementById('ci');
  const t = el.value.trim();
  if (!t) return;
  el.value = ''; gr(el);
  if (!started) { go(null); setTimeout(() => { addUser(t); const k=resolveKey(t); const r=k?(RESP[k]||FALLBACK):FALLBACK; const ty=addTyping(); setTimeout(()=>{ty.remove();showResp(r.text,r.card,r.fups);},500); }, 600); return; }
  q(t);
}

  let fa = '';
  if (fups && fups.length) {
    const btns = fups.map(function(f) {
      const lo = f.toLowerCase().trim();
      const key = LABEL_MAP[lo];
      const handler = key

function getIcon(label) {
  const lo = label.toLowerCase();
  for (const key of Object.keys(ICONS)) {
    if (lo.includes(key)) return ICONS[key];
  }
  // default sparkle for anything else
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg>';
}

// Inject icons into all .cc and .fup buttons after DOM ready
function injectBtnIcons() {
  document.querySelectorAll('.cc, .fup').forEach(btn => {
    if (btn.querySelector('svg')) return; // already has icon
    const label = btn.textContent.trim();
    btn.innerHTML = getIcon(label) + btn.innerHTML;
  });
}

(function(){
  const phrases=['Lead UX Product Designer','Product Thinker · Lead UX Researcher','25+ Case Studies · 12+ Years','Available for New Projects','Bilingual RTL · Arabic/English'];
  let pi=0,ci=0,deleting=false,el=null;
  function tick(){
    el=el||document.getElementById('sp-tw');
    if(!el)return;
    const word=phrases[pi];
    if(!deleting){
      el.textContent=word.slice(0,++ci);
      if(ci===word.length){deleting=true;setTimeout(tick,1800);return;}
    } else {
      el.textContent=word.slice(0,--ci);
      if(ci===0){deleting=false;pi=(pi+1)%phrases.length;setTimeout(tick,400);return;}
    }
    setTimeout(tick,deleting?45:75);
  }
  setTimeout(tick,900);
})();

/* ── AI message typewriter animation ── */
function animateText(el, html) {
  el.classList.add('typing');
  // Parse html into segments: {t:'text'|'tag', v:string}
  const segments = [];
  let buf = '', i = 0;
  while (i < html.length) {
    if (html[i] === '<') {
      if (buf) { segments.push({t:'text', v:buf}); buf=''; }
      let tag = '';
      while (i < html.length && html[i] !== '>') tag += html[i++];
      tag += '>'; i++;
      segments.push({t:'tag', v:tag});
    } else {
      buf += html[i++];
    }
  }
  if (buf) segments.push({t:'text', v:buf});

  el.innerHTML = '';
  let si = 0, ci2 = 0;
  const SPEED = 14; // ms per character

  function next() {
    if (si >= segments.length) {
      el.classList.remove('typing');
      sc(); return;
    }
    const seg = segments[si];
    if (seg.t === 'tag') {
      el.innerHTML += seg.v;
      si++; next();
    } else {
      if (ci2 < seg.v.length) {
        el.innerHTML += seg.v[ci2++];
        setTimeout(next, SPEED);
      } else {
        si++; ci2 = 0; next();
      }
    }
  }
  next();
}
